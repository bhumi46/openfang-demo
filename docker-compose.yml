services:
  openfang:
    platform: linux/amd64
    build: .
    container_name: openfang
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO:-bhumi46/openfang-demo}
    ports:
      - "4200:4200"
    volumes:
      - openfang-data:/root/.openfang
      - ./django-minion:/workspace/django-minion
      - ./test-django-app:/workspace/test-django-app
    stdin_open: true
    tty: true
    entrypoint: /bin/bash

volumes:
  openfang-data:
