[hand]
id          = "django-minion"
name        = "Django Minion"
version     = "1.0.0"
description = "Autonomous Django coding agent — monitors CI, fixes failing tests and lint errors, opens GitHub PRs."
category    = "productivity"
icon        = "🐍"
author      = "bhumi46"

[hand.agent]
name          = "django-minion-agent"
description   = "Detects failing tests and lint errors, writes fixes, opens GitHub PRs autonomously."
model         = "llama-3.3-70b-versatile"
provider      = "groq"
system_prompt = "system_prompt.txt"

[hand.schedule]
cron        = "0 */3 * * *"
timezone    = "Asia/Kolkata"
max_runtime = "20m"

[hand.guardrails]
max_files_changed = 8
max_pr_per_run    = 3
never_touch       = ["settings/production.py", ".env", "migrations/", "secrets.py"]

tools = ["shell_exec", "file_read", "file_write", "web_fetch", "web_search"]
